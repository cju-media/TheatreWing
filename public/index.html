<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheatreWing</title>
    <style>
        :root {
            --bg: #121212;
            --panel: #1e1e1e;
            --panel-header: #2d2d2d;
            --accent: #ff9f43;
            --accent-green: #10ac84;
            --text: #f5f6fa;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 20px;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--panel-header); padding-bottom: 15px; margin-bottom: 20px;
        }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .badge.disconnected { background: #ee5253; }
        .badge.connected { background: var(--accent-green); }
        
        /* App Layout */
        .workspace { display: grid; grid-template-columns: 1fr; gap: 20px; }
        body.edit-mode .workspace { grid-template-columns: 300px 1fr; }
        .panel { background: var(--panel); border-radius: 8px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .panel h3 { margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
        
        /* Configuration/Edit Panels */
        .edit-controls { display: none; background: #2a2a2a; padding: 15px; border-radius: 6px; margin-bottom: 15px; gap: 10px; flex-direction: column; }
        body.edit-mode .edit-controls { display: flex; }
        body.edit-mode .edit-only { display: inline-block; }
        .edit-only { display: none; }

        input, select, button {
            background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 4px; font-size: 0.9em;
        }
        button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; }
        button:hover { opacity: 0.9; }
        button.mode-toggle { background: #5f27cd; color: white; }
        button.fire-btn { background: var(--accent-green); color: white; width: 100%; margin-top: 10px; }
        button.delete-btn { background: #ee5253; color: white; padding: 2px 6px; font-size: 0.8em; }

        /* Character Items */
        .bank-item {
            background: #2d2d2d; padding: 10px; margin: 8px 0; border-radius: 6px;
            display: flex; justify-content: space-between; align-items: center;
            border-left: 4px solid var(--accent);
        }
        
        /* Scenes Layout */
        .scenes-grid { display: flex; flex-direction: column; gap: 10px; overflow-y: auto; padding-bottom: 10px; max-height: 80vh; }
        .scene-card {
            background: var(--panel); border-radius: 8px; width: 100%;
            border: 2px solid #333; display: flex; flex-direction: column; transition: border-color 0.2s;
        }
        .scene-card.active { border-color: var(--accent-green); background: #17251f; }
        .scene-header { background: var(--panel-header); padding: 5px 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .scene-body { padding: 5px 10px; flex-grow: 1; min-height: auto; }

        .scene-actors-container { display: flex; flex-wrap: wrap; gap: 5px; }
        .scene-actor-row {
            background: #252525; padding: 4px 8px; border-radius: 4px;
            display: inline-flex; align-items: center; gap: 8px; font-size: 0.85em;
        }
    </style>
</head>
<body>

    <header>
        <h2>🎭 TheatreWing</h2>
        <div style="display: flex; gap: 10px; align-items: center;">
            <button onclick="saveShowPrompt()" style="background: #10ac84;">💾 Save Show</button>
            <button onclick="loadShowPrompt()" style="background: #341f97;">📂 Load Show</button>
            <button class="mode-toggle" onclick="toggleEditMode()">⚙️ Toggle Edit Mode</button>
            <span id="status" class="badge disconnected">Disconnected</span>
        </div>
    </header>

    <div class="workspace">
        <div class="panel edit-only" id="characterBankSidebar">
            <h3>👥 Character Bank</h3>
            
            <div class="edit-controls">
                <input type="text" id="newCharName" placeholder="Character Name">
                <select id="newCharChan">
                    <script>
                        for(let i=1; i<=40; i++) document.write(`<option value="${i}">Channel ${i}</option>`);
                    </script>
                </select>
                <button onclick="addCharacterToBank()">Add to Registry</button>
            </div>

            <div id="characterBankPool"></div>
        </div>

        <div class="panel">
            <h3>🎬 Stage Scenes 
                <span class="edit-only">
                    <input type="number" step="0.1" id="newSceneId" placeholder="Scene ID (e.g. 1.5)" style="width: 130px;">
                    <input type="text" id="newSceneName" placeholder="Scene Title">
                    <button onclick="createNewScene()">+ Add Scene</button>
                </span>
            </h3>

            <div class="scenes-grid" id="scenesGrid"></div>
        </div>
    </div>

    <script>
        // --- APPLICATION STATE ---
        let state = {
            characters: {}, // ID: { name, channel }
            scenes: []      // Array of { id: float/int, name: string, actors: [charIds], dcas: {charId: dcaIndex} }
        };
        let activeSceneId = null;

        // --- SEED INITIAL DATA ---
        state.characters = {
            "c1": { name: "Hamilton", channel: 1 },
            "c2": { name: "Burr", channel: 2 },
            "c3": { name: "Eliza", channel: 3 }
        };
        state.scenes = [
            { id: 1.0, name: "The Aaron Burr, Sir", actors: ["c1", "c2"], dcas: {} },
            { id: 1.5, name: "Eliza Enters", actors: ["c1", "c2", "c3"], dcas: {} },
            { id: 2.0, name: "My Shot", actors: ["c1", "c2"], dcas: {} }
        ];

        // --- WEBSOCKET BRIDGE ---
        const ws = new WebSocket(`ws://${window.location.host}`);
        ws.onopen = () => { document.getElementById('status').className = 'badge connected'; document.getElementById('status').innerText = 'Connected to WING'; };
        ws.onclose = () => { document.getElementById('status').className = 'badge disconnected'; document.getElementById('status').innerText = 'Disconnected'; };

        function sendOscMute(channel, isMuted) {
            const formattedChannel = String(channel).padStart(2, '0');
            const value = isMuted ? 0 : 1; // WING Protocol: 1 = Unmuted (On), 0 = Muted (Off)
            
            const payload = {
                type: 'OSC_CMD',
                address: `/ch/${formattedChannel}/on`,
                args: [{ type: 'i', value: value }]
            };
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
        }

        function sendOscDca(channel, dcaGroup) {
            if (!dcaGroup) return; // Unassign is maybe 0?
            const formattedChannel = String(channel).padStart(2, '0');
            const payload = {
                type: 'OSC_CMD',
                address: `/ch/${formattedChannel}/dca`,
                args: [{ type: 'i', value: parseInt(dcaGroup) }]
            };
            if (ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
        }

        // --- UI DRAW ENGINE ---
        function dropCharacter(event, sceneId) {
            event.preventDefault();
            if (!document.body.classList.contains('edit-mode')) return;
            const charId = event.dataTransfer.getData('text/plain');
            if (charId && sceneId) {
                addActorToScene(sceneId, charId);
            }
        }

        function renderUI() {
            const isEditMode = document.body.classList.contains('edit-mode');
            // Render Bank
            const bankPool = document.getElementById('characterBankPool');
            bankPool.innerHTML = '';
            Object.keys(state.characters).forEach(id => {
                const char = state.characters[id];
                bankPool.innerHTML += `
                    <div class="bank-item" draggable="${isEditMode ? 'true' : 'false'}" ondragstart="event.dataTransfer.setData('text/plain', '${id}')">
                        <div>
                            <strong>${char.name}</strong> <br>
                            <small style="color:var(--accent)">CH ${char.channel}</small>
                        </div>
                        <div class="edit-only">
                            <select onchange="addActorToScene(this.value, '${id}')" style="padding:2px; font-size:0.8em;">
                                <option value="">+ Add to...</option>
                                ${state.scenes.map(s => `<option value="${s.id}">Scene ${s.id}</option>`).join('')}
                            </select>
                            <button class="delete-btn" onclick="deleteCharacter('${id}')">X</button>
                        </div>
                    </div>`;
            });

            // Render Scenes
            const grid = document.getElementById('scenesGrid');
            grid.innerHTML = '';
            
            // Sort scenes numerically so float values (1.5) index perfectly between integers
            state.scenes.sort((a, b) => a.id - b.id);

            let scenesToRender = state.scenes;
            if (!isEditMode) {
                let currentIndex = state.scenes.findIndex(s => s.id === activeSceneId);
                if (currentIndex === -1) currentIndex = 0;
                const currentScene = state.scenes[currentIndex];
                const nextScene = state.scenes[currentIndex + 1];
                scenesToRender = [];
                if (currentScene) scenesToRender.push(currentScene);
                if (nextScene) scenesToRender.push(nextScene);
            }

            scenesToRender.forEach((scene, index) => {
                const isActive = activeSceneId === scene.id;

                let sceneLabel = `${scene.id}. ${scene.name}`;

                let actorRows = '';
                
                scene.actors.forEach(charId => {
                    const actor = state.characters[charId];
                    if (!actor) return; // Handle orphaned IDs if deleted

                    // Fallback to older scenes missing the dcas object
                    if (!scene.dcas) scene.dcas = {};
                    const dcaAssignment = scene.dcas[charId];
                    let dcaDisplay = dcaAssignment ? `DCA ${dcaAssignment}` : 'No DCA';

                    actorRows += `
                        <div class="scene-actor-row">
                            <span>${actor.name}</span>
                            <span style="display:flex; align-items:center; gap: 8px;">
                                <span class="edit-only">
                                    <select style="padding:2px; font-size:0.8em;" onchange="updateCharacterDca('${scene.id}', '${charId}', this.value)">
                                        <option value="">No DCA</option>
                                        ${[1,2,3,4,5,6,7,8].map(i => `<option value="${i}" ${dcaAssignment == i ? 'selected' : ''}>DCA ${i}</option>`).join('')}
                                    </select>
                                </span>
                                <span class="badge" style="background:#5f27cd;">${dcaDisplay}</span>
                                <small style="color:#888">CH ${actor.channel}</small>
                                <button class="delete-btn edit-only" style="padding:1px 4px; font-size:0.7em;" onclick="removeActorFromScene('${scene.id}', '${charId}')">x</button>
                            </span>
                        </div>`;
                });

                grid.innerHTML += `
                    <div class="scene-card ${isActive ? 'active' : ''}" ondragover="event.preventDefault();" ondrop="dropCharacter(event, '${scene.id}')">
                        <div class="scene-header">
                            <span>${sceneLabel}</span>
                            <button class="delete-btn edit-only" onclick="deleteScene('${scene.id}')">Del</button>
                        </div>
                        <div class="scene-body">

                            <div class="scene-actors-container">${actorRows}</div>
                        </div>
                        <div style="padding:5px 10px; background:#222; border-top:1px solid #333;">
                            <button class="fire-btn" onclick="fireScene('${scene.id}')">${isActive ? '⚡ LIVE' : 'GO Scene'}</button>
                        </div>
                    </div>`;
            });
        }

        // --- SAVE / LOAD SHOW ---
        async function saveShowPrompt() {
            const path = prompt("Enter absolute file path to save the show (e.g., /path/to/show.json):");
            if (!path) return;
            try {
                const res = await fetch('/api/save-show', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path, state })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Show saved successfully.");
                } else {
                    alert("Error saving show: " + data.message);
                }
            } catch (e) {
                alert("Failed to save show.");
            }
        }

        async function loadShowPrompt() {
            const path = prompt("Enter absolute file path to load the show (e.g., /path/to/show.json):");
            if (!path) return;
            try {
                const res = await fetch('/api/load-show', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path })
                });
                const data = await res.json();
                if (data.success) {
                    if (data.state && data.state.characters && data.state.scenes) {
                        state = data.state;
                        activeSceneId = null;
                        renderUI();
                        alert("Show loaded successfully.");
                    } else {
                        alert("Invalid show file format.");
                    }
                } else {
                    alert("Error loading show: " + data.message);
                }
            } catch (e) {
                alert("Failed to load show.");
            }
        }

        // --- CONTROL LAYER ---
        function toggleEditMode() {
            document.body.classList.toggle('edit-mode');
            renderUI();

        }

        function addCharacterToBank() {
            const name = document.getElementById('newCharName').value.trim();
            const chan = parseInt(document.getElementById('newCharChan').value);
            if(!name) return;

            const id = 'c_' + Date.now();
            state.characters[id] = { name, channel: chan };
            document.getElementById('newCharName').value = '';
            renderUI();
        }

        function createNewScene() {
            const id = parseFloat(document.getElementById('newSceneId').value);
            const name = document.getElementById('newSceneName').value.trim();
            
            if(isNaN(id) || !name) return alert("Requires Valid Float ID & Title Name!");
            if(state.scenes.some(s => s.id === id)) return alert("Scene float value already exists!");

            state.scenes.push({ id, name, actors: [], dcas: {} });
            document.getElementById('newSceneId').value = '';
            document.getElementById('newSceneName').value = '';
            renderUI();
        }

        function addActorToScene(sceneId, charId) {
            if (!sceneId) return;
            const scene = state.scenes.find(s => String(s.id) === String(sceneId));
            if(scene && !scene.actors.includes(charId)) {
                scene.actors.push(charId);
            }
            renderUI();
        }

        function updateCharacterDca(sceneId, charId, dcaValue) {
            const scene = state.scenes.find(s => String(s.id) === String(sceneId));
            if(scene) {
                if (!scene.dcas) scene.dcas = {};
                scene.dcas[charId] = dcaValue;
            }
            renderUI();
        }

        function removeActorFromScene(sceneId, charId) {
            const scene = state.scenes.find(s => String(s.id) === String(sceneId));
            if(scene) {
                scene.actors = scene.actors.filter(id => id !== charId);
                if (scene.dcas) delete scene.dcas[charId];
            }
            renderUI();
        }

        function deleteCharacter(id) {
            delete state.characters[id];
            state.scenes.forEach(s => s.actors = s.actors.filter(cid => cid !== id));
            renderUI();
        }

        function deleteScene(id) {
            state.scenes = state.scenes.filter(s => String(s.id) !== String(id));
            renderUI();
        }

        // --- THE "GO" BUTTON ---
        // Fires the scene assignments directly into physical console layers
        function fireScene(sceneId) {
            activeSceneId = parseFloat(sceneId);
            const targetScene = state.scenes.find(s => s.id === activeSceneId);
            
            if(!targetScene) return;

            // Gather active channels for this scene
            const activeChannels = targetScene.actors.map(cid => state.characters[cid]?.channel).filter(Boolean);

            // Apply DCA changes for this scene
            if (!targetScene.dcas) targetScene.dcas = {};
            Object.entries(targetScene.dcas).forEach(([charId, dcaValue]) => {
                if (dcaValue && state.characters[charId]) {
                    sendOscDca(state.characters[charId].channel, dcaValue);
                }
            });

            // Command Loop: Unmute characters inside this scene, Mute any bank characters that aren't
            Object.values(state.characters).forEach(char => {
                if (activeChannels.includes(char.channel)) {
                    sendOscMute(char.channel, false); // Active / Unmuted
                } else {
                    sendOscMute(char.channel, true);  // Muted
                }
            });

            renderUI();

            // Scroll to the active scene
            setTimeout(() => {
                const activeCard = document.querySelector('.scene-card.active');
                if (activeCard) {
                    activeCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            }, 50);
        }

        // Arrow key navigation
        window.addEventListener('keydown', (e) => {
            const isEditMode = document.body.classList.contains('edit-mode');
            if (isEditMode) return;
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;

            state.scenes.sort((a, b) => a.id - b.id);
            let currentIndex = state.scenes.findIndex(s => s.id === activeSceneId);

            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                if (currentIndex === -1) {
                    if (state.scenes.length > 0) fireScene(state.scenes[0].id);
                } else if (currentIndex < state.scenes.length - 1) {
                    fireScene(state.scenes[currentIndex + 1].id);
                }
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                if (currentIndex > 0) {
                    fireScene(state.scenes[currentIndex - 1].id);
                }
            }
        });

        // Boot Init Execution
        async function boot() {
            try {
                const res = await fetch('/api/last-show');
                const data = await res.json();
                if (data.success && data.state && data.state.characters && data.state.scenes) {
                    state = data.state;
                }
            } catch (e) {
                console.error("Failed to fetch last show", e);
            }
            renderUI();
        }
        boot();
    </script>
</body>
</html>
